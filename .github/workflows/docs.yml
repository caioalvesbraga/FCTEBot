name: Publicar documentação (MkDocs)

# Publica a documentação no GitHub Pages a cada push na main que altere
# a documentação. Também pode ser disparado manualmente.
on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependências
        run: pip install -r requirements-docs.txt

      - name: Publicar no GitHub Pages (branch gh-pages)
        run: mkdocs gh-deploy --force --clean
