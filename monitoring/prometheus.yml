global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Aplicação FCTEBot
  - job_name: "fctebot"
    static_configs:
      - targets: ["app:9090"]
    metrics_path: "/metrics"
    scrape_interval: 15s

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

# Alertas configurados (RNF001: latência P95 ≤ 5s)
rule_files:
  - "alerts.yml"
